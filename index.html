<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dostluk Anıları</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
text-align:center;
padding:30px;
font-size:30px;
background:#1a1a1a;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:#1c1c1c;
border-radius:15px;
overflow:hidden;
margin-bottom:25px;
transition:0.3s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:100%;
}

.text{
padding:15px;
}

.date{
color:gray;
font-size:13px;
}

footer{
text-align:center;
padding:20px;
color:gray;
}
</style>
</head>

<body>

<header>
3 Yıllık Dostluk
</header>

<div class="container">

<div class="card">
<img src="IMG_5673.png">
<div class="text">
<div class="date">23 Şubat 2025</div>
Bu bizim en iyi anılarımızdan biri.
</div>
</div>

<div class="card">
<img src="IMG_5675.png">
<div class="text">
<div class="date">15 Aralık 2024</div>
Beraber geçirdiğimiz güzel zamanlar.
</div>
</div>

</div>

<footer>
Anı sitesi
</footer>

</body>
</html>
